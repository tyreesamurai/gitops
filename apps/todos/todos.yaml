apiVersion: apps/v1
kind: Deployment
metadata:
  name: todos
  namespace: juntos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todos
  template:
    metadata:
      labels:
        app: todos
    spec:
      containers:
        - name: todos
          image: ghcr.io/tyreesamurai/todos:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: todos-env
---
apiVersion: v1
kind: Service
metadata:
  name: todos
  namespace: juntos
spec:
  selector:
    app: todos
  ports:
    - port: 80
      targetPort: 3000
