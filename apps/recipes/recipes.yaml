apiVersion: apps/v1
kind: Deployment
metadata:
  name: recipes
  namespace: recipes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recipes
  template:
    metadata:
      labels:
        app: recipes
    spec:
      containers:
        - name: recipes
          image: ghcr.io/tyreesamurai/recipes:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: recipes-env
---
apiVersion: v1
kind: Service
metadata:
  name: recipes
  namespace: recipes
spec:
  selector:
    app: recipes
  ports:
    - port: 80
      targetPort: 3000
