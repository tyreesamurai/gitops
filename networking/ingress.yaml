apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tools-ingress
  namespace: tools
spec:
  ingressClassName: traefik
  rules:
    - host: todos.juntos.casa
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vikunja
                port:
                  number: 80
    - host: budget.juntos.casa
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: budget
                port:
                  number: 80
